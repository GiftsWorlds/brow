name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtwebengine qtwebview qtquickcontrols2'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android Metadata
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DQT_HOST_PATH=${{ env.Qt6_DIR }} \
            -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} \
            -DANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }}

      - name: Build APK
        run: cmake --build build --target apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusBrowser-Android
          path: build/**/*.apk
